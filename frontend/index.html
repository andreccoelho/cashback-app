<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cashback Nology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde:    #00e676;
      --verde-esc:#00b248;
      --fundo:    #0a0f0d;
      --card:     #111a14;
      --borda:    #1e2f21;
      --texto:    #e8f5e9;
      --muted:    #6a917a;
      --vip:      #ffd600;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--fundo);
      color: var(--texto);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .5;
    }

    .conteudo { position: relative; z-index: 1; width: 100%; max-width: 540px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 3rem; }
    .logo-tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      letter-spacing: .15em;
      color: var(--verde);
      border: 1px solid var(--verde);
      padding: .25rem .75rem;
      border-radius: 2px;
      margin-bottom: 1.25rem;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(2.2rem, 8vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.03em;
    }
    h1 span { color: var(--verde); }
    .subtitulo { margin-top: .6rem; color: var(--muted); font-size: .95rem; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .card-titulo {
      font-size: .7rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* ── Seletor de tipo ── */
    .seletor-tipo { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1.5rem; }
    .btn-tipo {
      background: transparent;
      border: 1px solid var(--borda);
      color: var(--muted);
      border-radius: 8px;
      padding: .9rem;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-tipo.ativo-normal { border-color: var(--verde); color: var(--verde); background: rgba(0,230,118,.07); }
    .btn-tipo.ativo-vip    { border-color: var(--vip);   color: var(--vip);   background: rgba(255,214,0,.07); }

    /* ── Input de valor ── */
    .grupo-input { position: relative; margin-bottom: 1.5rem; }
    .prefixo {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      font-family: 'DM Mono', monospace; color: var(--muted); font-size: 1rem;
      pointer-events: none;
    }
    input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--borda);
      border-radius: 8px;
      padding: .9rem 1rem .9rem 2.5rem;
      color: var(--texto);
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      outline: none;
      transition: border-color .2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: var(--verde); }

    /* ── Botão calcular ── */
    .btn-calcular {
      width: 100%;
      background: var(--verde);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: .05em;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-calcular:hover  { background: var(--verde-esc); }
    .btn-calcular:active { transform: scale(.98); }
    .btn-calcular:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Resultado ── */
    .resultado {
      display: none;
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .resultado.visivel { display: block; animation: surgir .35s ease; }
    @keyframes surgir { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
    .resultado-label { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
    .resultado-valor {
      font-size: 3rem; font-weight: 800; letter-spacing: -.04em;
      color: var(--verde); margin: .4rem 0;
    }
    .resultado-valor.vip-cor { color: var(--vip); }
    .resultado-detalhe { font-size: .85rem; color: var(--muted); }

    /* ── Histórico ── */
    .historico-lista { list-style: none; display: flex; flex-direction: column; gap: .6rem; }
    .historico-item {
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid var(--borda); border-radius: 8px; padding: .75rem 1rem;
      font-size: .9rem; transition: border-color .2s;
    }
    .historico-item:hover { border-color: var(--muted); }
    .historico-item-esq { display: flex; flex-direction: column; gap: .15rem; }
    .badge {
      display: inline-block; font-family: 'DM Mono', monospace;
      font-size: .65rem; letter-spacing: .1em; padding: .15rem .45rem;
      border-radius: 3px; text-transform: uppercase; font-weight: 500;
    }
    .badge-normal { background: rgba(0,230,118,.15); color: var(--verde); }
    .badge-vip    { background: rgba(255,214,0,.15);  color: var(--vip); }
    .historico-data { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); }
    .historico-valores { text-align: right; }
    .historico-cashback { font-weight: 700; color: var(--verde); }
    .historico-cashback.vip-cor { color: var(--vip); }
    .historico-compra { font-family: 'DM Mono', monospace; font-size: .75rem; color: var(--muted); }
    .vazio { text-align: center; color: var(--muted); font-size: .9rem; padding: 1.5rem 0; }
    .carregando { text-align: center; color: var(--muted); font-size: .85rem; padding: 1rem 0;
      font-family: 'DM Mono', monospace; animation: pulsar 1.2s infinite; }
    @keyframes pulsar { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* ── Erro ── */
    .erro-msg {
      display: none; background: rgba(255,82,82,.1); border: 1px solid rgba(255,82,82,.3);
      color: #ff5252; border-radius: 8px; padding: .8rem 1rem;
      font-size: .85rem; margin-top: .75rem; text-align: center;
    }
    .erro-msg.visivel { display: block; }
  </style>
</head>
<body>
  <div class="conteudo">
    <header>
      <div class="logo-tag">Nology Fintech</div>
      <h1>Cash<span>back</span></h1>
      <p class="subtitulo">Calcule o cashback de acordo com o seu perfil</p>
    </header>

    <!-- Formulário -->
    <div class="card">
      <p class="card-titulo">// Nova consulta</p>

      <div class="seletor-tipo">
        <button class="btn-tipo ativo-normal" id="btn-normal" onclick="selecionarTipo('NORMAL')">
          👤 Normal
        </button>
        <button class="btn-tipo" id="btn-vip" onclick="selecionarTipo('VIP')">
          ⭐ VIP
        </button>
      </div>

      <div class="grupo-input">
        <span class="prefixo">R$</span>
        <input type="number" id="valor-compra" placeholder="0,00" min="0" step="0.01" />
      </div>

      <button class="btn-calcular" id="btn-calcular" onclick="calcular()">
        Calcular Cashback
      </button>
      <div class="erro-msg" id="erro-msg"></div>
    </div>

    <!-- Resultado -->
    <div class="resultado" id="resultado">
      <div class="resultado-label">Seu cashback</div>
      <div class="resultado-valor" id="resultado-valor">R$ 0,00</div>
      <div class="resultado-detalhe" id="resultado-detalhe"></div>
    </div>

    <!-- Histórico -->
    <div class="card">
      <p class="card-titulo">// Histórico do seu IP</p>
      <ul class="historico-lista" id="historico-lista">
        <li class="carregando">carregando...</li>
      </ul>
    </div>
  </div>

  <script>
    // ── CONFIGURAÇÃO ────────────────────────────────────────────────────────
    // Troque pela URL do seu backend hospedado:
    const URL_API = 'https://SEU-BACKEND.onrender.com';

    // ── Estado ──────────────────────────────────────────────────────────────
    let tipoSelecionado = 'NORMAL';

    function selecionarTipo(tipo) {
      tipoSelecionado = tipo;
      document.getElementById('btn-normal').className =
        'btn-tipo' + (tipo === 'NORMAL' ? ' ativo-normal' : '');
      document.getElementById('btn-vip').className =
        'btn-tipo' + (tipo === 'VIP' ? ' ativo-vip' : '');
    }

    // ── Calcular ────────────────────────────────────────────────────────────
    async function calcular() {
      const valorInput = parseFloat(document.getElementById('valor-compra').value);
      const erroEl     = document.getElementById('erro-msg');
      erroEl.className = 'erro-msg';

      if (!valorInput || valorInput <= 0) {
        erroEl.textContent = 'Informe um valor de compra válido.';
        erroEl.className = 'erro-msg visivel';
        return;
      }

      const btn = document.getElementById('btn-calcular');
      btn.disabled = true;
      btn.textContent = 'Calculando...';

      try {
        const resposta = await fetch(`${URL_API}/calcular`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ tipo_cliente: tipoSelecionado, valor_compra: valorInput }),
        });

        const dados = await resposta.json();
        if (dados.erro) throw new Error(dados.erro);

        exibirResultado(dados);
        await carregarHistorico();
      } catch (e) {
        erroEl.textContent = 'Erro ao conectar com o servidor. Verifique a URL_API.';
        erroEl.className = 'erro-msg visivel';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Calcular Cashback';
      }
    }

    function exibirResultado(dados) {
      const el       = document.getElementById('resultado');
      const valorEl  = document.getElementById('resultado-valor');
      const detEl    = document.getElementById('resultado-detalhe');

      valorEl.textContent = `R$ ${dados.cashback.toFixed(2).replace('.', ',')}`;
      valorEl.className   = 'resultado-valor' + (dados.tipo_cliente === 'VIP' ? ' vip-cor' : '');
      detEl.textContent   = `Compra de R$ ${dados.valor_compra.toFixed(2).replace('.', ',')} · Cliente ${dados.tipo_cliente}`;
      el.className = 'resultado visivel';
    }

    // ── Histórico ───────────────────────────────────────────────────────────
    async function carregarHistorico() {
      const lista = document.getElementById('historico-lista');
      lista.innerHTML = '<li class="carregando">carregando...</li>';

      try {
        const resposta = await fetch(`${URL_API}/historico`);
        const dados    = await resposta.json();
        renderizarHistorico(dados.historico);
      } catch {
        lista.innerHTML = '<li class="vazio">Não foi possível carregar o histórico.</li>';
      }
    }

    function renderizarHistorico(itens) {
      const lista = document.getElementById('historico-lista');

      if (!itens || itens.length === 0) {
        lista.innerHTML = '<li class="vazio">Nenhuma consulta registrada ainda.</li>';
        return;
      }

      lista.innerHTML = itens.map(item => `
        <li class="historico-item">
          <div class="historico-item-esq">
            <span class="badge badge-${item.tipo_cliente.toLowerCase()}">${item.tipo_cliente}</span>
            <span class="historico-data">${item.criado_em}</span>
          </div>
          <div class="historico-valores">
            <div class="historico-cashback ${item.tipo_cliente === 'VIP' ? 'vip-cor' : ''}">
              +R$ ${item.cashback.toFixed(2).replace('.', ',')}
            </div>
            <div class="historico-compra">compra: R$ ${item.valor_compra.toFixed(2).replace('.', ',')}</div>
          </div>
        </li>
      `).join('');
    }

    // ── Atalho: Enter no input ──────────────────────────────────────────────
    document.getElementById('valor-compra').addEventListener('keydown', e => {
      if (e.key === 'Enter') calcular();
    });

    // Carrega histórico ao abrir a página
    carregarHistorico();
  </script>
</body>
</html>
